name: Deploy Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build OpenNext bundle
        run: npm run build:cloudflare
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL || 'https://convex-yuumi-challenges.veiledcat.de' }}
          NEXT_PUBLIC_SITE_URL: https://yuumi.quest
          NEXT_PUBLIC_APP_URL: https://yuumi.quest

      - name: Deploy Worker
        run: npx opennextjs-cloudflare deploy -- --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '34ec904c07227ab237ed84e4a2043cd5' }}

      - name: Smoke test workers.dev
        run: curl -fsS -o /dev/null -w "%{http_code}\n" https://yuumi-challenges.marc-kroll.workers.dev/

      - name: Smoke test production domain
        run: |
          code=$(curl -fsS -o /dev/null -w "%{http_code}" https://yuumi.quest/ || echo "000")
          echo "yuumi.quest status: $code"
          if [ "$code" != "200" ]; then
            echo "::warning::yuumi.quest returned $code — check Domains & DNS in Cloudflare dashboard"
          fi
