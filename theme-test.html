<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Test</title>
    <style>
        :root {
            --background: oklch(1 0 0);
            --foreground: oklch(0.09 0 0);
        }
        
        .dark {
            --background: oklch(0.04 0.006 247);
            --foreground: oklch(0.95 0.006 247);
        }
        
        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: system-ui;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        button {
            background-color: var(--foreground);
            color: var(--background);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        
        #status {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid var(--foreground);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Theme Switch Test</h1>
    <p>This is a simple test to verify theme switching functionality.</p>
    
    <div>
        <button onclick="setTheme('light')">Light Theme</button>
        <button onclick="setTheme('dark')">Dark Theme</button>
        <button onclick="setTheme('system')">System Theme</button>
    </div>
    
    <div id="status">
        Current theme: <span id="current-theme">unknown</span><br>
        HTML classes: <span id="html-classes">unknown</span><br>
        Background color: <span id="bg-color">unknown</span>
    </div>
    
    <script>
        function setTheme(theme) {
            localStorage.setItem('yuumi-ui-theme', theme);
            applyTheme(theme);
            updateStatus();
        }
        
        function applyTheme(theme) {
            document.documentElement.classList.remove('light', 'dark');
            
            if (theme === 'system') {
                const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.classList.add(systemTheme);
            } else {
                document.documentElement.classList.add(theme);
            }
        }
        
        function updateStatus() {
            const currentTheme = localStorage.getItem('yuumi-ui-theme') || 'system';
            const htmlClasses = document.documentElement.className;
            const bgColor = getComputedStyle(document.body).backgroundColor;
            
            document.getElementById('current-theme').textContent = currentTheme;
            document.getElementById('html-classes').textContent = htmlClasses || 'none';
            document.getElementById('bg-color').textContent = bgColor;
        }
        
        // Initialize
        const storedTheme = localStorage.getItem('yuumi-ui-theme') || 'system';
        applyTheme(storedTheme);
        updateStatus();
        
        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            const currentTheme = localStorage.getItem('yuumi-ui-theme') || 'system';
            if (currentTheme === 'system') {
                applyTheme('system');
                updateStatus();
            }
        });
    </script>
</body>
</html>
